url: https://max578.github.io/PESTO/

template:
  bootstrap: 5

reference:
- title: Core ensemble solvers
  desc: C++ kernel update equations (Chen-Oliver IES, Evensen MDA) and weighted objective.
  contents:
  - ensemble_solution
  - ensemble_solution_mda
  - ensemble_solution_gpu
  - compute_phi

- title: SVD backends
  desc: Automatic backend selection; randomised SVD; direct LAPACK.
  contents:
  - adaptive_svd
  - accelerate_svd
  - rsvd

- title: High-level PEST++ wrappers
  desc: Convenience wrappers driving PEST++ executables (`pestpp-ies`, `pestpp-glm`, …) from R.
  contents:
  - pesto_ies
  - pesto_glm
  - pesto_sweep
  - pesto_sensitivity
  - pesto_surrogate_ies
  - pesto_version

- title: Forward-model contract and multi-fidelity
  desc: Typed forward-model object both adapter modes honour, and the
    multi-fidelity (cheap / expensive) bridge with its control-variate combiner.
  contents:
  - pesto_forward_model
  - as_forward_model
  - pesto_evaluate
  - pesto_multifidelity_model
  - mf_control_variate

- title: ODE / compartmental forward-model templates
  desc: Ready-to-use differential-equation forward models -- a generic ODE
    builder plus crop-growth and SEIR specialisations -- that plug into the IES
    driver as typed forward-model objects.
  contents:
  - ode_forward_model
  - crop_growth_forward_model
  - seir_forward_model

- title: In-process IES via R callback
  desc: Driver and APSIM adapter for forward-model callable IES, bypassing the .pst file cycle.
  contents:
  - pesto_ies_callback
  - pesto_ies_filter
  - apsim_callback

- title: Inflation and localisation
  desc: Finite-ensemble pathology countermeasures -- covariance inflation against
    under-dispersion, localisation against spurious correlations, and the spread-ESS
    collapse diagnostic.
  contents:
  - pesto_inflation
  - pesto_localisation
  - ensemble_spread_ess
  - correlation_localisation
  - gaspari_cohn
  - ensemble_solution_localised

- title: Reference IES (pure R)
  desc: Textbook Chen & Oliver (2013) reference implementation used as the
    canonical comparison target by the comparison vignette.
  contents:
  - pesto_reference_ies

- title: Surrogates
  desc: Gaussian Process and Random Fourier Feature surrogates; convergence-aware ensemble sizing.
  contents:
  - train_gp_surrogate
  - predict_gp_surrogate
  - train_gp_surrogate_tuned
  - predict_gp_surrogate_tuned
  - train_rff_surrogate
  - predict_rff_surrogate
  - surrogate_ensemble_update
  - adaptive_ensemble_size
  - check_surrogate_regime

- title: PEST control file I/O
  desc: Read/write `.pst` files and ensemble snapshots; build scenarios programmatically.
  contents:
  - read_pst
  - write_pst
  - create_pest_scenario
  - read_ensemble
  - write_ensemble
  - print.pesto_pst

- title: Ensemble manifest (S7 cross-package contract)
  desc: Versioned, hashed, provenance-tracked ensemble-run container consumed by kernR and proxymix.
  contents:
  - pesto_ensemble_manifest
  - pesto_obs_schema
  - as_manifest
  - write_manifest
  - read_manifest
  - verify_manifest

- title: Visualisation
  desc: Publication-grade plots for convergence, ensembles, identifiability, surrogate diagnostics.
  contents:
  - plot_phi
  - plot_ensemble
  - plot_identifiability
  - plot_surrogate_diagnostics

articles:
- title: Get started
  navbar: ~
  contents:
  - getting-started

- title: Algorithms and comparison
  contents:
  - pestpp-comparison-and-simulation
  - surrogate-ies
  - inflation-localisation

- title: In-process IES and ensemble manifest
  contents:
  - apsim-callback
  - ensemble-manifest

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [github]
