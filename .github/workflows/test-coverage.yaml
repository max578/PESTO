# Test-coverage workflow for PESTO.
# Source: r-lib/actions test-coverage template (v2).
# Runs covr on a single ubuntu/R-release job and uploads to Codecov.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: test-coverage

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-coverage:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr, any::xml2
          needs: coverage

      - name: Test coverage
        run: |
          cov <- covr::package_coverage(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(
              normalizePath(Sys.getenv("RUNNER_TEMP"), winslash = "/"),
              "package"
            )
          )
          covr::to_cobertura(cov)
          ## Emit the headline number into the job log so coverage stays visible
          ## even when the Codecov upload is token-less (the badge is otherwise
          ## reported as "unknown"). Grep the log for "PESTO TOTAL COVERAGE".
          print(cov)
          cat(sprintf("PESTO TOTAL COVERAGE: %.2f%%\n", covr::percent_coverage(cov)))
        shell: Rscript {0}

      - uses: codecov/codecov-action@v4
        with:
          # A Codecov upload problem (e.g. no token configured) should not fail
          # the workflow; the report uploads when CODECOV_TOKEN is set.
          fail_ci_if_error: false
          file: ./cobertura.xml
          plugins: noop
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Show testthat output
        if: always()
        run: |
          ## --------------------------------------------------------------------
          find '${{ runner.temp }}/package' -name 'testthat.Rout*' -exec cat '{}' \; || true
        shell: bash

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-test-failures
          path: ${{ runner.temp }}/package
